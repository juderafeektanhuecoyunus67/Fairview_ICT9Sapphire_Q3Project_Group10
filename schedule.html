<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR Travels - Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    

    <style>
        html, body { height: 100%; margin: 0; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('romain-maistre-bazin-process-light.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
        }

        /* --- Navigation --- */
        .navbar-custom {
            background-color: rgb(0, 0, 0);
            border-bottom: 2px solid #1c1111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-box { border-right: 1px solid #c8c4c4; padding: 15px 40px; color: white; font-weight: bold; text-decoration: none; }
        .search-area { padding: 10px; display: flex; gap: 10px; }
        .go-btn { background: #c1db5c; color: black; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; }
        .go-btn1 { background: #3a535b; color: white; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; }

        /* --- Hero/Layout Section --- */
        .hero-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .content-container {
            background-color: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 15px;
            display: flex;
            width: 90%;
            max-width: 1100px;
            gap: 40px;
            border: 1px solid #333;
        }

        .left-text {
            flex: 1;
            text-align: left;
        }

        .calendar-tag {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        /* --- Calendar Styles --- */
        .calendar-box {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .calendar-header h3 { margin: 0; font-weight: bold; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }

        .day-name { font-weight: bold; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
        .day { padding: 10px 0; cursor: pointer; }
        .day:hover { background: #f0f0f0; border-radius: 5px; }
        .today { background: #c1db5c; border-radius: 5px; font-weight: bold; }

        .nav-arrow { cursor: pointer; font-size: 1.5rem; color: #555; }

        /* --- Footer --- */
        .footer-bar { width: 100%; padding: 15px 0; background-color: rgba(0, 0, 0, 0.85); color: #aaa; text-align: center; font-size: 0.85em; }
    </style>
</head>
<body>
    
    <header class="navbar-custom">
        <div style="display: flex;">
            <a href="index.html" class="nav-box">Home</a>
            <a href="locate.html" class="nav-box">Locate</a>
            <a href="schedule.html" class="nav-box">Schedule</a>
            <a href="help.html" class="nav-box">Help</a>
        </div>
        <div class="search-area">
            <button class="go-btn" onclick="window.location.href='registration.html'">Book now</button>
            <button class="go-btn1" onclick="window.location.href='registration.html'">Register</button>
        </div>
    </header>

    <main class="hero-section">
        <div class="content-container">
            <div class="left-text">
                <div class="calendar-tag">Calendar</div>
                <h3 style="font-style: italic; margin-top: 20px;">
                    Schedule the date when is it going to occur at?
                </h3>
            </div>

            <div class="calendar-box">
                <div class="calendar-header">
                    <span class="nav-arrow" onclick="changeMonth(-1)">&#10094;</span>
                    <h3 id="monthTitle">March 2026</h3>
                    <span class="nav-arrow" onclick="changeMonth(1)">&#10095;</span>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    </div>
            </div>
        </div>
    </main>

    <footer class="footer-bar">
        Jude T. Yunus & Hanzo Rui Del Rosario | Grade 9-Sapphire ©2026
    </footer>

    <script>
        let currentYear = 2026;
        let currentMonth = 2; // March is index 2 (0=Jan, 1=Feb, 2=Mar)

        const monthNames = ["January", "February", "March", "April", "May", "June",
                            "July", "August", "September", "October", "November", "December"];

        function renderCalendar(month, year) {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('monthTitle');
            grid.innerHTML = ""; // Clear current calendar

            title.innerText = `${monthNames[month]} ${year}`;

            // Add Day Headers
            ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].forEach(day => {
                const div = document.createElement('div');
                div.className = "day-name";
                div.innerText = day;
                grid.appendChild(div);
            });

            // Get first day of the month and total days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Fill empty slots for previous month
            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div');
                grid.appendChild(div);
            }

            //  actual days
            for (let i = 1; i <= daysInMonth; i++) {
                const div = document.createElement('div');
                div.className = "day";
                div.innerText = i;
                
                // Highlight today 
                if (i === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) {
                    div.classList.add("today");
                }
                
                grid.appendChild(div);
            }
        }

       
        // Run when page loads
        window.onload = () => {
            renderCalendar(currentMonth, currentYear);
        };
    </script>

</body>
</html>
