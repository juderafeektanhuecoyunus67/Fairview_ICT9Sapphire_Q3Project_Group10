<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JR Travels - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar-custom">
        <div style="display: flex;"><a href="index.html" class="nav-box">Home</a></div>
    </header>

    <main class="hero-section">
        <div class="glass-panel text-start" style="max-width: 500px;">
            <h3>Create Account</h3>
            <div class="mb-3 text-center">
                <img src="boy&girl choose.png" width="100" class="rounded-circle border">
            </div>
            <form onsubmit="event.preventDefault(); location.href='confirmation.html';">
                <label>Full name:</label>
                <input type="text" class="form-control bg-dark text-white mb-2" required>
                <label>Email Address:</label>
                <input type="email" class="form-control bg-dark text-white mb-2" required>
                <label>Password:</label>
                <input type="password" class="form-control bg-dark text-white mb-2" required>
                <label>Age:</label>
                <input type="number" class="form-control bg-dark text-white mb-2" min="1" max="100">
                <label>Gender:</label><br>
                <input type="radio" name="g"> Male <input type="radio" name="g" class="ms-3"> Female
                <div class="mt-4">
                    <input type="checkbox" required> I agree to the terms of use.
                </div>
                <button type="submit" class="btn btn-info w-100 mt-3">Create!</button>
            </form>
        </div>
    </main>
    <script src="proj.js"></script>
</body>
</html>
