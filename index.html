<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JR Travels - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar-custom">
        <div style="display: flex;">
            <a href="index.html" class="nav-box">Home</a>
            <a href="locate.html" class="nav-box">Locate</a>
            <a href="schedule.html" class="nav-box">Schedule</a>
            <a href="help.html" class="nav-box">Help</a>
        </div>
        <div class="search-area">
            <button class="go-btn" onclick="location.href='registration.html'">Book now</button>
            <button class="go-btn1" onclick="location.href='registration.html'">Register</button>
        </div>
    </header>

    <main class="hero-section">
        <div class="welcome-box">
            <h1 class="welcome-text">Hello User!</h1>
            <div class="logo-circle">
                <img src="JRTravels-logo-icon.png" alt="JR Travels Icon" style="width: 100%;">
            </div>
            <h2 class="welcome-text">Welcome to the <span class="brand-highlight">JR Travels!</span></h2>
        </div>

        <div class="glass-panel">
            <h2 style="color: #c1db5c;">JR Travels Pricing Matrix</h2>
            <div class="row mt-4">
                <div class="col-md-6 text-start">
                    <label>Pick up at:</label>
                    <select id="pickup" class="form-control bg-dark text-white mb-3">
                        <option value="0">North Avenue</option>
                        <option value="1">Quezon Avenue</option>
                        <option value="2">GMA Kamuning</option>
                        <option value="12">Taft Avenue</option>
                    </select>
                    <label>Drop off at:</label>
                    <select id="dropoff" class="form-control bg-dark text-white mb-3">
                        <option value="0">North Avenue</option>
                        <option value="12">Taft Avenue</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <div class="p-3 bg-secondary rounded">
                        <h4>Price:</h4>
                        <h1 id="displayPrice">₱ 0.00</h1>
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-warning me-2" onclick="calculateFare('regular')">Regular Price</button>
                        <button class="btn btn-danger" onclick="calculateFare('discount')">Discounted Price</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-bar">
        Jude T. Yunus & Hanzo Rui Del Rosario | Grade 9-Sapphire ©2026 | Source: metrolinemap.com
    </footer>
    <script src="proj.js"></script>
</body>
</html>
